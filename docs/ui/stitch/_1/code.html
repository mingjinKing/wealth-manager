<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#1e1e32",
                        "on-primary-container": "#644000",
                        "tertiary-fixed": "#ffdad8",
                        "surface-container-highest": "#333348",
                        "secondary-container": "#0063a9",
                        "surface-tint": "#ffb955",
                        "tertiary-fixed-dim": "#ffb3b0",
                        "outline-variant": "#524534",
                        "primary-fixed-dim": "#ffb955",
                        "surface-container-lowest": "#0c0c1f",
                        "background": "#111125",
                        "surface-bright": "#37374d",
                        "on-tertiary-fixed-variant": "#8b1820",
                        "tertiary-container": "#ff9b97",
                        "inverse-surface": "#e2e0fc",
                        "on-background": "#e2e0fc",
                        "on-surface-variant": "#d7c3ae",
                        "on-secondary-container": "#c7deff",
                        "on-primary-fixed-variant": "#633f00",
                        "inverse-primary": "#835500",
                        "on-error": "#690005",
                        "on-error-container": "#ffdad6",
                        "on-surface": "#e2e0fc",
                        "outline": "#9f8e7a",
                        "surface-variant": "#333348",
                        "on-secondary": "#003259",
                        "secondary-fixed": "#d2e4ff",
                        "tertiary": "#ffc4c0",
                        "primary-fixed": "#ffddb4",
                        "on-primary-fixed": "#291800",
                        "on-secondary-fixed-variant": "#00497e",
                        "on-tertiary-fixed": "#410006",
                        "primary-container": "#f5a623",
                        "surface-container-low": "#1a1a2e",
                        "on-tertiary": "#68000f",
                        "on-tertiary-container": "#8c1921",
                        "secondary": "#a0caff",
                        "surface-dim": "#111125",
                        "error": "#ffb4ab",
                        "on-secondary-fixed": "#001c37",
                        "surface-container-high": "#28283d",
                        "primary": "#ffc880",
                        "inverse-on-surface": "#2f2e43",
                        "on-primary": "#452b00",
                        "error-container": "#93000a",
                        "secondary-fixed-dim": "#a0caff",
                        "surface": "#111125"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(51, 51, 72, 0.6);
            backdrop-filter: blur(20px);
        }
        body {
            background-color: #0c0c1f;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#111125] flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#ffc880]">menu</span>
<h1 class="font-headline font-bold text-xl tracking-tight text-[#ffc880]">消费透视镜</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#ffc880] hover:opacity-80 transition-opacity active:duration-150 scale-95">settings</span>
</div>
</header>
<main class="pt-24 px-4 space-y-6 max-w-2xl mx-auto">
<!-- Summary Card -->
<section class="relative overflow-hidden bg-gradient-to-tr from-primary to-primary-container rounded-xl p-6 text-on-primary shadow-[0_16px_24px_rgba(255,185,85,0.1)]">
<div class="absolute top-[-20%] right-[-10%] w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
<div class="relative z-10">
<p class="font-label text-xs uppercase tracking-widest opacity-80 mb-1">本周总计</p>
<div class="flex items-baseline gap-2">
<span class="text-lg font-bold">¥</span>
<h2 class="font-headline text-5xl font-extrabold tracking-tighter">2,019</h2>
</div>
<div class="mt-4 inline-flex items-center gap-1 px-3 py-1 bg-on-primary/10 rounded-full text-sm font-semibold">
<span class="material-symbols-outlined text-sm">trending_up</span>
<span>vs 上周 ↑12%</span>
</div>
</div>
</section>
<!-- Consumption Structure -->
<section class="bg-surface-container rounded-xl p-6">
<div class="flex justify-between items-end mb-6">
<h3 class="font-headline text-xl font-bold">消费结构</h3>
<span class="text-on-surface-variant text-sm font-medium">本周分布</span>
</div>
<div class="space-y-5">
<!-- Dining -->
<div class="group">
<div class="flex justify-between items-center mb-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">restaurant</span>
<span class="font-medium">餐饮</span>
</div>
<span class="font-bold text-primary">¥1,240</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 80%"></div>
</div>
</div>
<!-- Shopping -->
<div class="group">
<div class="flex justify-between items-center mb-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary">shopping_bag</span>
<span class="font-medium">购物</span>
</div>
<span class="font-bold">¥480</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-secondary rounded-full" style="width: 50%"></div>
</div>
</div>
<!-- Transport -->
<div class="group">
<div class="flex justify-between items-center mb-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-tertiary">directions_car</span>
<span class="font-medium">交通</span>
</div>
<span class="font-bold text-tertiary">¥210</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-tertiary rounded-full" style="width: 30%"></div>
</div>
</div>
<!-- Entertainment -->
<div class="group">
<div class="flex justify-between items-center mb-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline">movie</span>
<span class="font-medium">娱乐</span>
</div>
<span class="font-bold">¥89</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-outline rounded-full" style="width: 15%"></div>
</div>
</div>
</div>
</section>
<!-- AI Insights Card -->
<section class="bg-surface-container-high rounded-xl p-6 border-l-4 border-primary relative overflow-hidden">
<div class="flex items-start gap-4">
<div class="bg-primary/20 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</div>
<div class="flex-1">
<h4 class="font-bold mb-2 text-primary">智能洞察</h4>
<p class="text-on-surface-variant leading-relaxed mb-4">外卖每周减少1次，月可节省约 <span class="text-primary font-bold">¥200</span></p>
<button class="bg-secondary-container text-on-secondary-container px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 hover:opacity-90 active:scale-95 transition-all">
                        查看详情
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
</section>
<!-- Wow Moment Card -->
<section class="bg-surface rounded-xl p-6 border border-outline-variant/20 relative group hover:bg-surface-container transition-colors">
<div class="flex justify-between items-start mb-4">
<div>
<div class="inline-flex items-center gap-1 px-2 py-0.5 bg-tertiary-container/20 text-tertiary text-[10px] font-bold uppercase tracking-widest rounded mb-2">
                        已触发
                    </div>
<h3 class="font-headline text-2xl font-black text-white italic">🎉 哇时刻</h3>
</div>
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">military_tech</span>
</div>
<p class="text-3xl font-headline font-extrabold mb-4">本周少花 ¥237.50</p>
<a class="text-primary-fixed-dim font-bold flex items-center gap-1 text-sm group-hover:translate-x-1 transition-transform" href="#">
                查看我的成就 →
            </a>
</section>
</main>
<!-- FAB -->
<button class="fixed bottom-28 right-6 w-14 h-14 rounded-2xl bg-gradient-to-tr from-primary to-primary-container text-on-primary shadow-xl flex items-center justify-center z-50 hover:scale-110 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
<!-- BottomNavBar -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-[#333348]/60 backdrop-blur-xl rounded-2xl flex justify-around items-center px-4 py-3 z-50 shadow-[0_16px_24px_rgba(255,185,85,0.06)]">
<a class="flex items-center justify-center bg-gradient-to-tr from-[#ffc880] to-[#f5a623] text-[#0c0c1f] rounded-xl w-12 h-12 transition-all active:scale-90" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dashboard</span>
</a>
<a class="flex items-center justify-center text-white/50 w-12 h-12 hover:text-white transition-all active:scale-90" href="#">
<span class="material-symbols-outlined">add_circle</span>
</a>
<a class="flex items-center justify-center text-white/50 w-12 h-12 hover:text-white transition-all active:scale-90" href="#">
<span class="material-symbols-outlined">insights</span>
</a>
<a class="flex items-center justify-center text-white/50 w-12 h-12 hover:text-white transition-all active:scale-90" href="#">
<span class="material-symbols-outlined">military_tech</span>
</a>
</nav>
</body></html>
